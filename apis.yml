apis:
- aid: stord:stord-api
  name: Stord API
  description: 'REST API for managing orders, inventory, shipments, and returns within
    the Stord commerce fulfillment platform. Built with an API-first design using
    JSON:API specification and OpenAPI annotations. Supports EDI, API over HTTPS,
    and flat-file connectivity for integrating with ERPs, warehouses, online marketplaces,
    and retail partners. Authentication requires API Key, Organisation ID, Network
    ID, and Facility ID obtained through a Stord account representative.

    '
